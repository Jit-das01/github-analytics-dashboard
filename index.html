<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Analytics Dashboard Pro</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --bg-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --text-primary: #ffffff;
            --card-bg: #ffffff;
            --text-dark: #333333;
            --accent: #667eea;
        }
        [data-theme="dark"] {
            --bg-primary: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --card-bg: #1a1f2e;
            --text-dark: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            padding: 20px;
            transition: all 0.3s;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }
            to { filter: drop-shadow(0 0 20px rgba(255,255,255,0.8)); }
        }
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1.5rem;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        .theme-toggle:hover { transform: scale(1.1) rotate(180deg); }
        .search-box {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-dark);
        }
        .input-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            color: var(--text-dark);
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--accent);
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            align-self: flex-end;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .loading {
            text-align: center;
            padding: 60px;
            color: white;
        }
        .spinner {
            width: 60px;
            height: 60px;
            margin: 20px auto;
            border: 5px solid rgba(255,255,255,0.3);
            border-top: 5px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
        }
        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            animation: slideUp 0.5s ease-out;
            transition: transform 0.3s;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card:hover { transform: translateY(-5px); }
        .card h2 {
            color: var(--text-dark);
            margin-bottom: 20px;
            border-bottom: 3px solid var(--accent);
            padding-bottom: 12px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .stat-item {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            transition: transform 0.2s;
        }
        .stat-item:hover { transform: scale(1.05); }
        .stat-value {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 8px;
        }
        .stat-label {
            font-size: 0.9rem;
            color: #666;
            font-weight: 500;
        }
        .language-bar {
            display: flex;
            height: 30px;
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
        }
        .language-segment {
            transition: opacity 0.3s;
            cursor: pointer;
        }
        .language-segment:hover { opacity: 0.8; }
        .language-legend {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
        .contributor-grid {
            display: grid;
            gap: 15px;
            max-height: 400px;
            overflow-y: auto;
        }
        .contributor-card {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            transition: all 0.3s;
        }
        .contributor-card:hover {
            transform: translateX(5px);
            background: #e9ecef;
        }
        .contributor-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid var(--accent);
        }
        .contributor-name {
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 5px;
        }
        .ai-insights {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .ai-insights h2 {
            color: white;
            border-bottom-color: white;
        }
        .insight-content {
            line-height: 1.8;
            font-size: 1.05rem;
        }
        .error {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            margin: 20px 0;
        }
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .dashboard { grid-template-columns: 1fr; }
            .header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const languageColors = {
            JavaScript: '#f1e05a', Python: '#3572A5', Java: '#b07219',
            TypeScript: '#2b7489', 'C++': '#f34b7d', C: '#555555',
            'C#': '#178600', PHP: '#4F5D95', Ruby: '#701516',
            Go: '#00ADD8', Swift: '#ffac45', Kotlin: '#F18E33',
            Rust: '#dea584', HTML: '#e34c26', CSS: '#563d7c'
        };

        function App() {
            const [theme, setTheme] = useState('light');
            const [username, setUsername] = useState('');
            const [repo, setRepo] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [repoData, setRepoData] = useState(null);
            const [languages, setLanguages] = useState(null);
            const [contributors, setContributors] = useState([]);
            const [aiInsights, setAiInsights] = useState('');

            useEffect(() => {
                document.documentElement.setAttribute('data-theme', theme);
            }, [theme]);

            const analyzeRepo = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                setRepoData(null);

                try {
                    const repoRes = await fetch(`https://api.github.com/repos/${username}/${repo}`);
                    if (!repoRes.ok) throw new Error('Repository not found!');
                    const data = await repoRes.json();
                    setRepoData(data);

                    const langRes = await fetch(`https://api.github.com/repos/${username}/${repo}/languages`);
                    const langData = await langRes.json();
                    setLanguages(langData);

                    const contribRes = await fetch(`https://api.github.com/repos/${username}/${repo}/contributors?per_page=10`);
                    const contribData = await contribRes.json();
                    setContributors(contribData);

                    const insights = `
🎯 Project Health: ${data.stargazers_count > 10000 ? 'Excellent' : data.stargazers_count > 1000 ? 'Strong' : 'Moderate'} engagement with ${data.stargazers_count.toLocaleString()} stars.

👥 Community: ${contribData.length} contributors showing ${contribData.length > 50 ? 'strong collaborative development' : contribData.length > 10 ? 'healthy team collaboration' : 'focused development'}.

💻 Tech Stack: Primarily ${data.language || 'Multiple languages'} with ${Object.keys(langData).length} programming languages.

⚡ Recommendations: ${data.open_issues_count > 50 ? 'Consider addressing the backlog of open issues.' : 'Issue management looks healthy.'}
                    `;
                    setAiInsights(insights);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            const calculateLangPercent = () => {
                if (!languages) return [];
                const total = Object.values(languages).reduce((s, v) => s + v, 0);
                return Object.entries(languages).map(([name, bytes]) => ({
                    name,
                    percentage: ((bytes / total) * 100).toFixed(1),
                    color: languageColors[name] || '#' + Math.floor(Math.random()*16777215).toString(16)
                })).sort((a, b) => b.percentage - a.percentage);
            };

            return (
                <div className="container">
                    <button className="theme-toggle" onClick={() => setTheme(theme === 'light' ? 'dark' : 'light')}>
                        {theme === 'light' ? '🌙' : '☀️'}
                    </button>

                    <div className="header">
                        <h1>🚀 GitHub Analytics Dashboard Pro</h1>
                        <p>Advanced insights with AI-powered analysis</p>
                    </div>

                    <div className="search-box">
                        <form onSubmit={analyzeRepo}>
                            <div className="form-grid">
                                <div className="input-group">
                                    <label>GitHub Username</label>
                                    <input value={username} onChange={(e) => setUsername(e.target.value)} placeholder="e.g., facebook" required />
                                </div>
                                <div className="input-group">
                                    <label>Repository Name</label>
                                    <input value={repo} onChange={(e) => setRepo(e.target.value)} placeholder="e.g., react" required />
                                </div>
                                <button type="submit" disabled={loading}>
                                    {loading ? '🔄 Analyzing...' : '🔍 Analyze'}
                                </button>
                            </div>
                        </form>
                    </div>

                    {loading && (
                        <div className="loading">
                            <div className="spinner"></div>
                            <p>Analyzing repository...</p>
                        </div>
                    )}

                    {error && <div className="error">❌ {error}</div>}

                    {repoData && (
                        <div className="dashboard">
                            <div className="card">
                                <h2>📊 Statistics</h2>
                                <div className="stats-grid">
                                    <div className="stat-item">
                                        <div className="stat-value">⭐ {repoData.stargazers_count.toLocaleString()}</div>
                                        <div className="stat-label">Stars</div>
                                    </div>
                                    <div className="stat-item">
                                        <div className="stat-value">🍴 {repoData.forks_count.toLocaleString()}</div>
                                        <div className="stat-label">Forks</div>
                                    </div>
                                    <div className="stat-item">
                                        <div className="stat-value">👁️ {repoData.watchers_count.toLocaleString()}</div>
                                        <div className="stat-label">Watchers</div>
                                    </div>
                                    <div className="stat-item">
                                        <div className="stat-value">🐛 {repoData.open_issues_count.toLocaleString()}</div>
                                        <div className="stat-label">Issues</div>
                                    </div>
                                </div>
                            </div>

                            <div className="card">
                                <h2>💻 Languages</h2>
                                <div className="language-bar">
                                    {calculateLangPercent().map((lang, i) => (
                                        <div key={i} className="language-segment" style={{width: `${lang.percentage}%`, background: lang.color}} title={`${lang.name}: ${lang.percentage}%`} />
                                    ))}
                                </div>
                                <div className="language-legend">
                                    {calculateLangPercent().slice(0, 6).map((lang, i) => (
                                        <div key={i} className="legend-item">
                                            <div className="legend-color" style={{background: lang.color}}></div>
                                            <span>{lang.name} ({lang.percentage}%)</span>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="card">
                                <h2>👥 Contributors</h2>
                                <div className="contributor-grid">
                                    {contributors.map((c, i) => (
                                        <div key={i} className="contributor-card">
                                            <img src={c.avatar_url} alt={c.login} className="contributor-avatar" />
                                            <div>
                                                <div className="contributor-name">{c.login}</div>
                                                <div>💪 {c.contributions} contributions</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {aiInsights && (
                                <div className="card ai-insights">
                                    <h2>🤖 AI Insights</h2>
                                    <div className="insight-content">
                                        {aiInsights.split('\n').filter(l => l.trim()).map((l, i) => <p key={i}>{l}</p>)}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
