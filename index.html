<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Analytics Dashboard</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 40px; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .header p { font-size: 1.1rem; opacity: 0.9; }
        .search-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .input-group input:focus { outline: none; border-color: #667eea; }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .results {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-top: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }
        .results h2 { color: #333; margin-bottom: 15px; border-bottom: 3px solid #667eea; padding-bottom: 10px; }
        .results p { color: #666; margin-bottom: 20px; line-height: 1.6; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .stat { 
            padding: 15px; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 10px;
            text-align: center;
        }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: #667eea; margin-bottom: 5px; }
        .stat-label { font-size: 0.9rem; color: #666; font-weight: 500; }
        .loading { text-align: center; color: white; padding: 40px; font-size: 1.2rem; }
        .error { background: #ff4444; color: white; padding: 20px; border-radius: 10px; text-align: center; margin-top: 20px; }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [username, setUsername] = useState('');
            const [repo, setRepo] = useState('');
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const analyze = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                setData(null);

                try {
                    const response = await fetch(`https://api.github.com/repos/${username}/${repo}`);
                    
                    if (!response.ok) {
                        throw new Error('Repository not found! Please check the username and repo name.');
                    }
                    
                    const result = await response.json();
                    setData(result);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="container">
                    <div className="header">
                        <h1>🚀 GitHub Analytics Dashboard</h1>
                        <p>Analyze any public GitHub repository</p>
                    </div>
                    
                    <div className="search-box">
                        <form onSubmit={analyze}>
                            <div className="input-group">
                                <label>GitHub Username</label>
                                <input 
                                    type="text"
                                    value={username}
                                    onChange={(e) => setUsername(e.target.value)}
                                    placeholder="e.g., facebook"
                                    required
                                />
                            </div>
                            <div className="input-group">
                                <label>Repository Name</label>
                                <input 
                                    type="text"
                                    value={repo}
                                    onChange={(e) => setRepo(e.target.value)}
                                    placeholder="e.g., react"
                                    required
                                />
                            </div>
                            <button type="submit" disabled={loading}>
                                {loading ? '🔍 Analyzing...' : '🔍 Analyze Repository'}
                            </button>
                        </form>
                    </div>

                    {loading && (
                        <div className="loading">
                            <div className="spinner"></div>
                            <p>Fetching repository data...</p>
                        </div>
                    )}

                    {error && <div className="error">{error}</div>}

                    {data && (
                        <div className="results">
                            <h2>📊 {data.name}</h2>
                            <p>{data.description || 'No description available'}</p>
                            
                            <div className="stats-grid">
                                <div className="stat">
                                    <div className="stat-value">⭐ {data.stargazers_count?.toLocaleString()}</div>
                                    <div className="stat-label">Stars</div>
                                </div>
                                <div className="stat">
                                    <div className="stat-value">🍴 {data.forks_count?.toLocaleString()}</div>
                                    <div className="stat-label">Forks</div>
                                </div>
                                <div className="stat">
                                    <div className="stat-value">👁️ {data.watchers_count?.toLocaleString()}</div>
                                    <div className="stat-label">Watchers</div>
                                </div>
                                <div className="stat">
                                    <div className="stat-value">🐛 {data.open_issues_count?.toLocaleString()}</div>
                                    <div className="stat-label">Open Issues</div>
                                </div>
                                <div className="stat">
                                    <div className="stat-value">💻 {data.language || 'N/A'}</div>
                                    <div className="stat-label">Primary Language</div>
                                </div>
                                <div className="stat">
                                    <div className="stat-value">📦 {(data.size / 1024).toFixed(1)} MB</div>
                                    <div className="stat-label">Repository Size</div>
                                </div>
                            </div>
                            
                            <div style={{marginTop: '20px', padding: '15px', background: '#f8f9fa', borderRadius: '8px'}}>
                                <strong>🔗 Repository URL:</strong> <a href={data.html_url} target="_blank" style={{color: '#667eea'}}>{data.html_url}</a>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
